spring.application.name=Rapidito

# ==========================
# Configuraciµn de Conexiµn MySQL
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/rapidito
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# Configuraciµn JPA / Hibernate
# ==========================
# create | create-drop | update | validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true


# ==========================
# Pool de Conexiones (HikariCP - por defecto en Spring Boot)
# ==========================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000