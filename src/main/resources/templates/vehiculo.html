<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${editMode} ? 'Editar Vehículo' : 'Nuevo Vehículo'">Vehículo</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: 56px;
        }
        .main-content {
            flex: 1;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Rapidito</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/clientes}">Clientes</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" th:href="@{/vehiculos}">Vehículos <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contratos}">Contratos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reservas}">Reservas</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="main-content">
    <div class="container mt-4">
        <h1 th:text="${editMode} ? 'Editar Vehículo' : 'Nuevo Vehículo'">Vehículo</h1>
        
        <form th:action="@{/vehiculos/{id}(id=${vehiculo.id})}" th:object="${vehiculo}" method="post">
            <div class="form-group">
                <label for="numeroBastidor">Número de Bastidor:</label>
                <input type="text" class="form-control" id="numeroBastidor" th:field="*{numeroBastidor}" required>
            </div>
            
            <div class="form-group">
                <label for="marca">Marca:</label>
                <input type="text" class="form-control" id="marca" th:field="*{marca}" required>
            </div>
            
            <div class="form-group">
                <label for="modelo">Modelo:</label>
                <input type="text" class="form-control" id="modelo" th:field="*{modelo}" required>
            </div>
            
            <div class="form-group">
                <label for="matricula">Matrícula:</label>
                <input type="text" class="form-control" id="matricula" th:field="*{matricula}" required>
            </div>
            
            <div class="form-group">
                <label for="tipoCombustible">Tipo de Combustible:</label>
                <input type="text" class="form-control" id="tipoCombustible" th:field="*{tipoCombustible}" required>
            </div>
            
            <div class="form-group">
                <label for="precioDia">Precio por día:</label>
                <input type="number" step="0.01" class="form-control" id="precioDia" th:field="*{precioDia}" required min="0">
            </div>
            
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a th:href="@{/vehiculos/}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-auto">
    <div class="container">
        <p>&copy; 2026 Rapidito</p>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
