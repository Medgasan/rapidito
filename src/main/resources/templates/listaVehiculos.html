<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Vehículos</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: 56px;
        }
        .main-content {
            flex: 1;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Rapidito</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/clientes}">Clientes</a>
                </li>
                <li class="nav-item active">
                    <a class="nav-link" th:href="@{/vehiculos}">Vehículos <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/contratos}">Contratos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reservas}">Reservas</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="main-content">
    <div class="container mt-4">
        <h1>Lista de Vehículos</h1>
        <a href="/vehiculos/new" class="btn btn-primary mb-3">Nuevo Vehículo</a>
        
        <div class="mb-3">
            <form th:action="@{/vehiculos/{marca}/list}" method="get">
                <div class="input-group">
                    <input type="text" class="form-control" name="marca" placeholder="Filtrar por marca" th:value="${param.marca}">
                    <button type="submit" class="btn btn-secondary">Filtrar</button>
                    <a th:href="@{/vehiculos/}" class="btn btn-outline-secondary">Limpiar</a>
                </div>
            </form>
        </div>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Matrícula</th>
                    <th>Combustible</th>
                    <th>Precio/Día</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="vehiculo : ${vehiculos}">
                    <td th:text="${vehiculo.id}">ID</td>
                    <td th:text="${vehiculo.marca}">Marca</td>
                    <td th:text="${vehiculo.modelo}">Modelo</td>
                    <td th:text="${vehiculo.matricula}">Matrícula</td>
                    <td th:text="${vehiculo.tipoCombustible}">Combustible</td>
                    <td th:text="${vehiculo.precioDia}">Precio/Día</td>
                    <td>
                        <a th:href="@{/vehiculos/{id}(id=${vehiculo.id})}" class="btn btn-sm btn-info">Ver</a>
                        <a th:href="@{/vehiculos/{id}/edit(id=${vehiculo.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/vehiculos/{id}/delete(id=${vehiculo.id})}" class="btn btn-sm btn-danger" onclick="return confirm('¿Está seguro de eliminar este vehículo?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-auto">
    <div class="container">
        <p>&copy; 2026 Rapidito</p>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
