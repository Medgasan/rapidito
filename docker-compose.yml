services:

  db:
    image: mysql:8.0
    container_name: rapidito-db
    environment:
      MYSQL_DATABASE: rapidito
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: rapidito
      MYSQL_PASSWORD: rapidito123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rapidito-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/rapidito?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: rapidito
      SPRING_DATASOURCE_PASSWORD: rapidito123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_API_BASE_URL: http://localhost:8080/api
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: